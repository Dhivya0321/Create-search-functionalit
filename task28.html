<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Search</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.search-box{
    text-align:center;
    margin-bottom:30px;
}

.search-box input{
    width:80%;
    max-width:500px;
    padding:15px;
    border:none;
    border-radius:30px;
    font-size:18px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card h3{
    margin:10px 0;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🛒 Product Search</h1>

<div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
        onkeyup="searchProducts()">
</div>

<div class="products" id="productContainer">

    <div class="card product">
        <h3>Smart Watch</h3>
        <p class="price">₹2999</p>
    </div>

    <div class="card product">
        <h3>Wireless Headphones</h3>
        <p class="price">₹1999</p>
    </div>

    <div class="card product">
        <h3>Sports Shoes</h3>
        <p class="price">₹3499</p>
    </div>

    <div class="card product">
        <h3>Smartphone</h3>
        <p class="price">₹19999</p>
    </div>

    <div class="card product">
        <h3>Laptop</h3>
        <p class="price">₹54999</p>
    </div>

    <div class="card product">
        <h3>Gaming Mouse</h3>
        <p class="price">₹999</p>
    </div>

</div>

<script>
function searchProducts() {

    let input =
    document.getElementById("searchInput")
    .value.toLowerCase();

    let products =
    document.querySelectorAll(".product");

    products.forEach(product => {

        let title =
        product.querySelector("h3")
        .textContent.toLowerCase();

        if(title.includes(input)){
            product.style.display = "block";
        } else {
            product.style.display = "none";
        }

    });
}
</script>

</body>
</html>
